name: "Light Companion App"
slug: "lightcompanion_app"
version: "0.2.4"
description: "Natural-language light control companion as a Home Assistant add-on app."
url: "https://github.com/Jerry0022/homeassistant-lightcompanion"
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:head-lightbulb"
panel_title: "Light Companion"
homeassistant_api: true
auth_api: true
hassio_api: true
options:
  provider: "openai"
  api_key: ""
  model: "gpt-4o-mini"
  base_url: "https://api.openai.com/v1"
schema:
  provider: list(openai|anthropic|google)
  api_key: password
  model: str
  base_url: str
ports:
  "8099/tcp": null
ports_description:
  "8099/tcp": "Light Companion web UI (optional; ingress is recommended)"
